version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: club_management_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: club_management
      POSTGRES_USER: club_user
      POSTGRES_PASSWORD: SecurePass123!
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U club_user -d club_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - club_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: club_management_app
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: club_user
      DB_PASSWORD: SecurePass123!
      DB_NAME: club_management
      PORT: 8080
      SESSION_KEY: change-this-to-a-secure-random-key-32-bytes-long
      ENV: production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - club_network
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
    driver: local

networks:
  club_network:
    driver: bridge
